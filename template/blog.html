{% extends 'default/index.html' %}
{%- block content %}
<h2>Blog</h2>

{% for post in posts %}
<div class="blog-post">
  <h3><a href="/blog/{{ post.slug }}.html">{{ post.title }}</a></h3>
  <span class="post-date">{{ post.date }}</span>
  {{ post.body|markdown }}
</div>
{% endfor %}
{%- endblock %}
